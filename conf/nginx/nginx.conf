# Nginx 网关配置模板
# 支持动态 ADMIN_BASE_PATH 环境变量

upstream directus_backend {
    server directus:8055;
}

upstream cubejs_backend {
    server cubejs:4000;
}

# 未来的 React Workstation 后端（暂时注释）
# upstream react_workstation {
#     server react-workstation:3000;
# }

server {
    listen 80;
    server_name localhost;

    # 日志配置
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # 客户端上传大小限制（支持大 CSV 文件）
    client_max_body_size 500M;

    # 超时配置（支持长时间查询）
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # ==========================================
    # 路由 1: 管理后台（Directus）
    # 路径前缀由 ADMIN_BASE_PATH 环境变量控制
    # ==========================================
    location ${ADMIN_BASE_PATH}/ {
        proxy_pass http://directus_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（Directus 实时功能）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ==========================================
    # 路由 2: Cube.js API（查询接口）
    # ==========================================
    location /cubejs-api/ {
        proxy_pass http://cubejs_backend/cubejs-api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 传递租户上下文头（从前端传入）
        proxy_set_header X-Tenant-Id $http_x_tenant_id;
        proxy_set_header X-Project-Id $http_x_project_id;
        proxy_set_header X-User-Id $http_x_user_id;
        
        # CORS 支持（开发阶段）
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-Id, X-Project-Id, X-User-Id" always;
        
        if ($request_method = OPTIONS) {
            return 204;
        }
    }    
    
    # ==========================================
    # 路由 3: 前端链接管理后台（Directus）
    # 路径前缀由 ADMIN_BASE_PATH 环境变量控制
    # ==========================================
    location /api/ {
        # 剥离 /api 前缀后转发给 Directus
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://directus_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 支持（Directus 实时订阅）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # 安全阻断：禁止通过 /api/ 通道访问后台界面静态资源
        # 防止攻击者通过 /api/ 路径枚举出后台 Vue App 的 JS/CSS
        
        # CORS 支持（开发阶段）
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
          return 204;
        }

        location ~* ^/api/(admin|extensions|app) {
            return 403;
        }
    }

    # ==========================================
    # 路由 4: React Workstation（业务终端）
    # v1 暂未实现，预留路由
    # ==========================================
    # location / {
    #     proxy_pass http://react_workstation/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }

    # ==========================================
    # 临时：根路径返回系统状态
    # ==========================================
    location = / {
        return 200 '{"status":"ok","message":"Veloxis Gateway Running","admin_path":"${ADMIN_BASE_PATH}","cubejs_api":"/cubejs-api"}';
        add_header Content-Type application/json;
    }

    # ==========================================
    # 健康检查端点
    # ==========================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ==========================================
    # 安全：隐藏 Nginx 版本号
    # ==========================================
    server_tokens off;
}
