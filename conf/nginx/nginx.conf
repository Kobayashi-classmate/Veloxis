# Nginx 完整配置（适配 nginx:alpine 官方镜像）
# 通过 /etc/nginx/templates/nginx.conf.template 挂载，
# 启动时由 envsubst 渲染环境变量后写入 /etc/nginx/nginx.conf

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format veloxis_log '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'rt=$request_time uct="$upstream_connect_time" '
                           'uht="$upstream_header_time" urt="$upstream_response_time" '
                           'xid=$http_x_request_id';

    access_log  /var/log/nginx/access.log  veloxis_log;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # 全局代理缓冲
    proxy_buffering       on;
    proxy_buffer_size     128k;
    proxy_buffers         4 256k;
    proxy_busy_buffers_size 512k;
    client_body_buffer_size 1M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss;
    gzip_disable "msie6";

    # ── Upstream 连接池 ──────────────────────────────────────────────────────

    upstream directus_backend {
        server directus:8055 max_fails=3 fail_timeout=30s;
        keepalive 32;
        keepalive_timeout 60s;
    }

    upstream cubejs_backend {
        server cubejs:4000 max_fails=3 fail_timeout=30s;
        keepalive 32;
        keepalive_timeout 60s;
    }

    upstream worker_backend {
        server data-worker:3000 max_fails=3 fail_timeout=30s;
        keepalive 16;
        keepalive_timeout 60s;
    }

    # ── Server ───────────────────────────────────────────────────────────────

    server {
        listen 80 default_server;
        server_name localhost;

        # 隐藏版本号
        server_tokens off;

        # 客户端限制（支持大文件上传）
        client_max_body_size 500M;
        client_body_timeout  30s;
        client_header_timeout 30s;

        # 上游超时（支持长时间查询）
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # 支持流式上传（不在 nginx 侧缓存请求体）
        proxy_request_buffering off;

        # 安全响应头
        add_header X-Content-Type-Options  "nosniff"                    always;
        add_header X-Frame-Options         "SAMEORIGIN"                  always;
        add_header X-XSS-Protection        "1; mode=block"               always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # ── 通用代理头（macro-like，各 location 复用） ──
        # 注意：proxy_set_header 会继承，无需每处重复

        # ============================================================
        # 路由 1：Directus 管理后台
        # ADMIN_BASE_PATH 由 envsubst 替换，例如 /hdjskefs45
        # ============================================================
        location ${ADMIN_BASE_PATH}/ {
            proxy_pass http://directus_backend/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $server_name;
            proxy_set_header X-Request-ID      $http_x_request_id;

            # WebSocket 支持（Directus 实时订阅）
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $http_connection;
        }

        # ============================================================
        # 路由 2：Cube.js 查询 API
        # ============================================================
        location /cubejs-api/ {
            proxy_pass http://cubejs_backend/cubejs-api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $http_x_request_id;

            # 租户上下文透传
            proxy_set_header X-Tenant-Id  $http_x_tenant_id;
            proxy_set_header X-Project-Id $http_x_project_id;
            proxy_set_header X-User-Id    $http_x_user_id;

            # CORS
            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Vary "Origin" always;

            # OPTIONS 预检
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $http_origin always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, X-Tenant-Id, X-Project-Id, X-User-Id" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age           "86400" always;
                add_header Content-Length "0" always;
                return 204;
            }
        }

        # ============================================================
        # 路由 2.5：Data Worker API（需要 Directus JWT）
        # ============================================================
        location /worker-api/ {
            # OPTIONS 预检
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $http_origin always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, X-Request-ID, X-Tenant-Id, X-Project-Id, X-User-Id" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age           "86400" always;
                add_header Vary "Origin" always;
                add_header Content-Length "0" always;
                return 204;
            }

            proxy_pass http://worker_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $http_x_request_id;
            proxy_set_header Authorization      $http_authorization;

            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Vary "Origin" always;
        }

        # ============================================================
        # 路由 3：前端调用 Directus API（/api/* → Directus /*)
        # ============================================================
        location /api/ {
            # 禁止通过 /api/ 通道访问后台静态资源
            location ~* ^/api/(admin|extensions|app) {
                add_header Content-Type text/plain;
                return 403 "Forbidden: Admin resources not accessible via /api/";
            }

            # OPTIONS 预检
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin      $http_origin;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS";
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, X-Request-ID, X-Tenant-Id, X-Project-Id, X-User-Id";
                add_header Access-Control-Allow-Credentials "true";
                add_header Access-Control-Max-Age           "86400";
                add_header Vary "Origin";
                add_header Content-Length "0";
                return 204;
            }

            # 剥离 /api 前缀后转发 Directus
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://directus_backend;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $server_name;
            proxy_set_header X-Request-ID      $http_x_request_id;

            # WebSocket 支持
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $http_connection;

            # CORS
            add_header Access-Control-Allow-Origin      $http_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Vary "Origin" always;
        }

        # ============================================================
        # 根路径：网关状态
        # ============================================================
        location = / {
            default_type application/json;
            return 200 '{"status":"ok","message":"Veloxis Gateway Running","admin_path":"${ADMIN_BASE_PATH}"}';
            access_log off;
        }

        # ============================================================
        # 健康检查
        # ============================================================
        location /health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }

        # ============================================================
        # 错误页面
        # ============================================================
        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            default_type application/json;
            return 502 '{"status":"error","message":"Upstream service unavailable"}';
        }
    }
}
