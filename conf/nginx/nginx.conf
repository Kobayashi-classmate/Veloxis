# Nginx 网关配置模板（优化版）
# 支持动态 ADMIN_BASE_PATH 环境变量，包含性能和安全优化

# 全局优化配置
client_body_buffer_size 1M;
proxy_buffering on;
proxy_buffer_size 128k;
proxy_buffers 4 256k;
proxy_busy_buffers_size 512k;

# Gzip 压缩配置
gzip on;
gzip_vary on;
gzip_min_length 1000;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
gzip_disable "msie6";

# 日志格式升级
log_format veloxis_log '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time" '
                      'xid=$http_x_request_id';

upstream directus_backend {
    # 连接池优化
    keepalive 32;
    keepalive_timeout 60s;
    server directus:8055 max_fails=3 fail_timeout=30s;
}

upstream cubejs_backend {
    # 连接池优化
    keepalive 32;
    keepalive_timeout 60s;
    server cubejs:4000 max_fails=3 fail_timeout=30s;
}

# 未来的 React Workstation 后端（暂时注释）
# upstream react_workstation {
#     server react-workstation:3000;
# }

server {
    listen 80 default_server;
    server_name localhost;

    # 日志配置（使用自定义格式）
    access_log /var/log/nginx/access.log veloxis_log;
    error_log /var/log/nginx/error.log warn;

    # 隐藏 Nginx 版本号
    server_tokens off;

    # 客户端上传大小限制（支持大 CSV 文件）
    client_max_body_size 500M;
    
    # 请求体超时
    client_body_timeout 30s;
    client_header_timeout 30s;

    # 超时配置（支持长时间查询）
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # 关闭proxy buffering以支持流式传输
    proxy_request_buffering off;

    # 安全headers（所有响应）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==========================================
    # 路由 1: 管理后台（Directus）
    # 路径前缀由 ADMIN_BASE_PATH 环境变量控制
    # ==========================================
    location ${ADMIN_BASE_PATH}/ {
        proxy_pass http://directus_backend/;
        proxy_http_version 1.1;
        
        # 标准代理headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Connection "";
        
        # WebSocket 支持（Directus 实时功能）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_http_version 1.1;
        
        # 连接池
        proxy_set_header Connection "";
        
        # 请求追踪
        proxy_set_header X-Request-ID $http_x_request_id;
    }

    # ==========================================
    # 路由 2: Cube.js API（查询接口）
    # ==========================================
    location /cubejs-api/ {
        proxy_pass http://cubejs_backend/cubejs-api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $http_x_request_id;
        
        # 传递租户上下文头（从前端传入）
        proxy_set_header X-Tenant-Id $http_x_tenant_id;
        proxy_set_header X-Project-Id $http_x_project_id;
        proxy_set_header X-User-Id $http_x_user_id;
        
        # CORS 支持
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Tenant-Id, X-Project-Id, X-User-Id" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age "86400" always;
            add_header Content-Length "0" always;
            return 204;
        }
        
        # CORS 支持（非预检请求）
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary "Origin" always;
        
        # 缓存配置（查询结果可缓存）
        add_header Cache-Control "public, max-age=3600" always;
    }
    
    # ==========================================
    # 路由 3: 前端链接管理后台（Directus）
    # 路径前缀由 ADMIN_BASE_PATH 环境变量控制
    # ==========================================
    location /api/ {
        # 安全阻止：禁止通过 /api/ 通道访问后台界面静态资源
        location ~* ^/api/(admin|extensions|app) {
            return 403 "Forbidden: Admin resources not accessible via /api/";
            add_header Content-Type text/plain;
        }
        
        # OPTIONS 预检请求处理
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-Request-ID, X-Tenant-Id, X-Project-Id, X-User-Id";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Max-Age "86400";
            add_header Vary "Origin";
            add_header Content-Length "0";
            return 204;
        }

        # 剥离 /api 前缀后转发给 Directus
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://directus_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Request-ID $http_x_request_id;
        
        # WebSocket 支持（Directus 实时订阅）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        
        # CORS 支持（非预检请求）
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary "Origin" always;
    }

    # ==========================================
    # 路由 4: React Workstation（业务终端）
    # v1 暂未实现，预留路由
    # ==========================================
    # location / {
    #     proxy_pass http://react_workstation/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }

    # ==========================================
    # 临时：根路径返回系统状态
    # ==========================================
    location = / {
        default_type application/json;
        return 200 '{"status":"ok","message":"Veloxis Gateway Running","admin_path":"${ADMIN_BASE_PATH}","timestamp":"$date_iso8601"}';
        access_log off;
    }

    # ==========================================
    # 健康检查端点
    # ==========================================
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # ==========================================
    # 错误页面处理
    # ==========================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
