server {
    listen 80;
    server_name localhost;

    # 管控面：Directus UI 与 API，采用自定义前缀保护
    # 例如 /admin-console 就会转发给 directus:8055
    location ${ADMIN_BASE_PATH}/ {
        proxy_pass http://directus:8055/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 支持 Websocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Headless BI：Cube 接口层
    location /cube/ {
        proxy_pass http://cubejs:4000/;
    }

    # 未来挂载 React Workstation 前端
    location / {
        # proxy_pass http://react-workstation:3000/;
        return 200 "React Workstation Pending...";
    }
    
    # 彻底屏蔽旧的默认后台地址，防止被扫描
    location /admin {
        return 404;
    }
}